<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Coding Club Logo</title>
</head>

<body style="margin:0; background:#1f334a; display:flex; justify-content:center; align-items:center; height:100vh;">

<canvas id="logoCanvas" width="500" height="450"></canvas>

<script>
const canvas = document.getElementById("logoCanvas");
const ctx = canvas.getContext("2d");

// Background
ctx.fillStyle = "#1f334a";
ctx.fillRect(0, 0, canvas.width, canvas.height);


// ===== LEFT < =====
let leftGrad = ctx.createLinearGradient(90,120,170,240);
leftGrad.addColorStop(0, "#d4ff00");
leftGrad.addColorStop(1, "#00c853");

ctx.fillStyle = leftGrad;
ctx.beginPath();
ctx.moveTo(150,120);
ctx.lineTo(90,180);
ctx.lineTo(150,240);
ctx.lineTo(170,220);
ctx.lineTo(120,180);
ctx.lineTo(170,140);
ctx.closePath();
ctx.fill();


ctx.save();

ctx.translate(240, 180);
ctx.rotate(20 * Math.PI / 180);

let slashGrad = ctx.createLinearGradient(0, -75, 0, 75);
slashGrad.addColorStop(0, "#ffe600");  // yellow top
slashGrad.addColorStop(1, "#00b0ff");  // blue bottom

ctx.fillStyle = slashGrad;

ctx.beginPath();
ctx.roundRect(-8, -75, 16, 150, 8);
ctx.fill();

ctx.restore();


// ===== RIGHT > =====
let rightGrad = ctx.createLinearGradient(330,120,410,240);
rightGrad.addColorStop(0, "#00e5ff");
rightGrad.addColorStop(1, "#1565c0");

ctx.fillStyle = rightGrad;
ctx.beginPath();
ctx.moveTo(350,120);
ctx.lineTo(410,180);
ctx.lineTo(350,240);
ctx.lineTo(330,220);
ctx.lineTo(380,180);
ctx.lineTo(330,140);
ctx.closePath();
ctx.fill();


// ===== MAIN TITLE =====
ctx.fillStyle = "#e0e0e0";
ctx.font = "36px Arial";
ctx.textAlign = "center";
ctx.fillText("CODING CLUB", 250, 310);


// ===== TAGLINE =====
ctx.fillStyle = "#b0bec5";
ctx.font = "14px Arial";
ctx.fillText("INNOVATE. CODE. CREATE.", 250, 345);

</script>

</body>
</html>
